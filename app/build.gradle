plugins {
    id 'com.android.application'
}

android {
    compileSdk 35
    namespace "io.github.muntashirakon.adb.testapp"

    defaultConfig {
        applicationId "io.github.muntashirakon.adb.testapp"
        minSdk 21
        targetSdk 35
        versionCode 8
        versionName "3.1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation project(path: ':libadb')
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'com.google.android.material:material:1.12.0'

    // Generate the X509Certificate and write it as PEM using BouncyCastle (no native deps).
    implementation 'org.bouncycastle:bcprov-jdk15to18:1.84'
    implementation 'org.bouncycastle:bcpkix-jdk15to18:1.84'
}
